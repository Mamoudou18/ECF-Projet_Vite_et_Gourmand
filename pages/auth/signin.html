<div class="container">
    <div class="register-container mx-auto">
        <div class="register-card">
            
            <!-- Header -->
            <div class="register-header">
                <i class="bi bi-box-arrow-in-right"></i>
                <h2>Connexion</h2>
                <p class="mb-0">Veillez vous connecter pour profiter pleinement de nos services</p>
            </div>

            <div class="register-body">

                <form id="loginForm">

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope-fill"></i> Adresse email *
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-at"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="votre.email@exemple.com" required>
                        </div>
                        <small id="emailMessage" class="text-danger" style="display: none;">
                            Votre adresse mail ne respecte pas le format!
                        </small>
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock-fill primary"></i> Mot de passe *
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input 
                                type="password" class="form-control" id="password" placeholder="••••••••••" required>
                            <span class="password-toggle" type="button" id="togglePassword">
                                <i class="bi bi-eye-fill"></i>
                            </span>
                        </div>
                    </diV>

                    <!-- Bouton inscription -->
                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <i class="bi bi-person-plus-fill"></i> Se connecter
                    </button>

                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>OU</span>
                </div>

                <!-- Lien d'inscription -->
                <div class="text-center">
                    <p class="mb-0">
                        Vous n'êtes pas encore inscrit(e)s ?
                        <a href="/signup" class="link-signin">
                            <i class="bi bi-person-plus-fill"></i> S'inscrire
                        </a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>
