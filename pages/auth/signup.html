<div class="container">
    <div class="register-container mx-auto">
        <div class="register-card">
            
            <!-- Header -->
            <div class="register-header">
                <i class="bi bi-person-plus-fill"></i>
                <h2>Créer un compte</h2>
                <p class="mb-0">Rejoignez-nous en quelques clics</p>
            </div>

            <!-- Body -->
            <div class="register-body">
                
                <!-- Messages -->
                <div id="errorMessage" class="alert alert-danger" style="display: none;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="errorText"></span>
                </div>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    
                    <!-- Nom et Prénom -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="nom" class="form-label">
                                <i class="bi bi-person-fill"></i> Nom *
                            </label>
                            <input type="text" class="form-control" id="nom" placeholder="Votre nom" required minlength="2">
                        </div>
                        <div class="col-md-6">
                            <label for="prenom" class="form-label">
                                <i class="bi bi-person-fill"></i> Prénom *
                            </label>
                            <input type="text" class="form-control" id="prenom" placeholder="Votre prénom" required minlength="2">
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope-fill"></i> Adresse email *
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-at"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="votre.email@exemple.com" required>
                        </div>
                    </div>

                    <!-- Téléphone -->
                    <div class="mb-3">
                        <label for="telephone" class="form-label">
                            <i class="bi bi-telephone-fill"></i> Numéro de téléphone (GSM) *
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-phone"></i>
                            </span>
                            <input type="tel" class="form-control" id="telephone" placeholder="06 12 34 56 78" required pattern="[0-9]{10}" title="Format : 0612345678 (10 chiffres)">
                        </div>
                        <small class="text-muted">Format : 10 chiffres sans espaces</small>
                    </div>

                    <!-- Adresse postale -->
                    <div class="mb-3">
                        <label for="adresse" class="form-label">
                            <i class="bi bi-geo-alt-fill"></i> Adresse postale *
                        </label>
                        <textarea 
                            class="form-control" id="adresse" rows="2" placeholder="12 rue de la République, 33000 Bordeaux" required>
                        </textarea>
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock-fill primary"></i> Mot de passe *
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input 
                                type="password" class="form-control" id="password" placeholder="••••••••••" required minlength="10" oninput="checkPasswordStrength()">
                            <span class="password-toggle" onclick="togglePassword('password', 'toggleIcon1')">
                                <i class="bi bi-eye-fill" id="toggleIcon1"></i>
                            </span>
                        </div>
                        
                        <!-- Barre de force -->
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>

                        <!-- Exigences -->
                        <div class="password-requirements mt-2">
                            <div class="requirement" id="req-length">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Minimum 10 caractères</span>
                            </div>
                            <div class="requirement" id="req-uppercase">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 majuscule</span>
                            </div>
                            <div class="requirement" id="req-lowercase">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 minuscule</span>
                            </div>
                            <div class="requirement" id="req-number">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 chiffre</span>
                            </div>
                            <div class="requirement" id="req-special">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 caractère spécial (!@#$%^&*)</span>
                            </div>
                        </div>
                    </div>

                    <!-- Confirmation mot de passe -->
                    <div class="mb-3">
                        <label for="passwordConfirm" class="form-label">
                            <i class="bi bi-shield-lock-fill"></i> Confirmer le mot de passe *
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input 
                                type="password" class="form-control" id="passwordConfirm" placeholder="••••••••••" required oninput="checkPasswordMatch()">
                            <span class="password-toggle" onclick="togglePassword('passwordConfirm', 'toggleIcon2')">
                                <i class="bi bi-eye-fill" id="toggleIcon2"></i>
                            </span>
                        </div>
                        <small id="passwordMatchMessage" class="text-danger" style="display: none;">
                            Les mots de passe ne correspondent pas
                        </small>
                    </div>

                    <!-- RGPD -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="rgpd" 
                                required
                            >
                            <label class="form-check-label" for="rgpd">
                                J'accepte la <a href="mentions_legales.html" target="_blank" class="link-primary-custom">politique de confidentialité</a> 
                                et les <a href="cgv.html" target="_blank" class="link-primary-custom">CGV</a> *
                            </label>
                        </div>
                    </div>

                    <!-- Bouton inscription -->
                    <button type="submit" class="btn btn-register" id="registerBtn">
                        <i class="bi bi-person-plus-fill"></i> Créer mon compte
                    </button>

                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>OU</span>
                </div>

                <!-- Lien connexion -->
                <div class="text-center">
                    <p class="mb-0">
                        Vous avez déjà un compte ?
                        <a href="login.html" class="link-signin">
                            <i class="bi bi-box-arrow-in-right"></i> Se connecter
                        </a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>
