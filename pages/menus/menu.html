<div class="container-fluid menus-container">
    <!--- Header menus -->
    <div class="container">
        <div class="page-header text-center">
            <h1><i class="bi bi-card-list"></i> Découvrez nos menus</h1>
            <p> Une selection de nos menus gourmands pour tous vous évènements</p>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <!---SideBar filtres-->
            <div class="col-lg-3">
                <div class="filters-sidebar">
                    <h5><i class="bi bi-funnel"></i>Filtres</h5>

                    <!-- Prix -->
                    <div class="filter-section">
                        <h6><i class="bi bi-cash-coin"></i> Prix</h6>
                        
                        <div class="mb-3">
                            <label class="form-label">Prix maximum</label>
                            <input type="range" class="form-range" id="maxPrice" min="0" max="500" step="10" value="500">
                            <div class="price-range-display" id="maxPriceDisplay">500 €</div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Fourchette de prix</label>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <input type="number" class="form-control" min="0" id="minPriceInput" placeholder="Min" value="0">
                            </div>
                            <div class="col-6">
                                <input type="number" class="form-control" min="0" id="maxPriceInput" placeholder="Max" value="500">
                            </div>
                        </div> 
                    </div>

                    <!--- Thèmes -->
                    <div class="filter-section">
                        <h6><i class="bi bi-calendar-event"></i> Thème</h6>
                        <div class="form-check mb-2">
                            <input class="form-check-input theme-filter" type="checkbox" value="noel" id="themeNoel">
                            <label class="form-check-label" for="themeNoel">
                                Noël
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input theme-filter" type="checkbox" value="paques" id="themePaques">
                            <label class="form-check-label" for="themePaques">
                                Pâques
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input theme-filter" type="checkbox" value="classique" id="themeClassique">
                            <label class="form-check-label" for="themeClassique">
                                Classique
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input theme-filter" type="checkbox" value="evenement" id="themeEvenement">
                            <label class="form-check-label" for="themeEvenement">
                                Événement
                            </label>
                        </div>
                    </div>

                    <!--- Régimes -->
                    <div class="filter-section">
                        <h6><i class="bi bi-egg-fried"></i> Régime alimentaire</h6>
                        <div class="form-check mb-2">
                            <input class="form-check-input regime-filter" type="checkbox" value="classique" id="regimeClassique">
                            <label class="form-check-label" for="regimeClassique">
                                Classique
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input regime-filter" type="checkbox" value="vegetarien" id="regimeVegetarien">
                            <label class="form-check-label" for="regimeVegetarien">
                                Végétarien
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input regime-filter" type="checkbox" value="vegan" id="regimeVegan">
                            <label class="form-check-label" for="regimeVegan">
                                Vegan
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input regime-filter" type="checkbox" value="sans-gluten" id="regimeSansGluten">
                            <label class="form-check-label" for="regimeSansGluten">
                                Sans gluten
                            </label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input regime-filter" type="checkbox" value="hallal" id="regimeHallal">
                            <label class="form-check-label" for="regimeHallal">
                                Hallal
                            </label>
                        </div>
                    </div>

                    <!-- Nombre de personnes minimum -->
                    <div class="filter-section">
                        <h6><i class="bi bi-people"></i> Nombre de personnes</h6>
                        <select class="form-select" id="minPersonsFilter">
                            <option value="">Tous</option>
                            <option value="4">4 personnes min.</option>
                            <option value="6">6 personnes min.</option>
                            <option value="8">8 personnes min.</option>
                            <option value="10">10 personnes min.</option>
                            <option value="15">15 personnes min.</option>
                        </select>
                    </div>

                    <!-- Boutons -->
                    <div class="filter-buttons">
                        <button type="submit" class="btn btn-filter">
                            <i class="bi bi-check-circle"></i> Appliquer les filtres
                        </button>
                        <button type="submit" class="btn btn-reset">
                            <i class="bi bi-arrow-counterclockwise"></i> Réinitialiser les filtres
                        </button>
                    </div>
                </div>
            </div>

            <!--- Contenu principal: affichage des menus-->
            <div class="col-lg-9">
                <!-- Résultats header -->
                <div class="results-header">
                    <div class="results-count">
                        <i class="bi bi-card-text"></i>
                        <span id="resultsCount">24</span> menu(s) trouvé(s)
                    </div>
                    <select class="form-select sort-select" id="sortSelect">
                        <option value="default">Trier par défaut</option>
                        <option value="price-asc">Prix croissant</option>
                        <option value="price-desc">Prix décroissant</option>
                        <option value="persons-asc">Pers. minimum (croissant)</option>
                        <option value="persons-desc">Pers. minimum (décroissant)</option>
                    </select>
                </div>

                <!-- Grille de menus -->
                <div class="row g-4" id="menusGrid">
                    <!-- Les menus seront injectés ici par JavaScript -->
                </div>

                <div class="pagination-container">
                    <!-- Pagination -->
                    <div id="pagination" class="text-center">
                        <button id="prev-page" type="button" class="btn btn-pagination"><i class="bi bi-chevron-left"></i>Précédent</button>
                        <span id="page-info">Page 1 sur 1</span>
                        <button id="next-page" type="button" class="btn btn-pagination"></i>Suivant<i class="bi bi-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
