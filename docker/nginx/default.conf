# ✅ On garde ta config, mais on l'adapte pour Heroku

server {
    listen ${PORT};
    server_name _;

    root /app;
    client_max_body_size 10M;

    # ===========================================
    # UPLOADS - fichiers statiques
    # ===========================================
    location /uploads/ {
        alias /app/backend/public/uploads/;
        try_files $uri =404;
    }

    # ===========================================
    # BACKEND API
    # ===========================================
    location /api {
        rewrite ^/api/?(.*)$ /backend/public/index.php last;
    }

    # Traitement PHP
    location ~ \.php$ {
        root /app;
        fastcgi_pass heroku-fcgi;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # ===========================================
    # FRONTEND - SPA Router
    # ===========================================
    location / {
        root /app/frontend;
        try_files $uri /index.html;
    }
}
