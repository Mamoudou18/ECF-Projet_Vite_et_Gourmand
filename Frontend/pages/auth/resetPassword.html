<div class="container">
    <div class="register-container mx-auto">
        <div class="register-card">
            
            <!-- Header -->
            <div class="register-header">
                <i class="bi bi-unlock-fill"></i>
                <h2>Réinitialisation du mot de passe</h2>
            </div>

            <div class="register-body">

                <form id="resetPasswordForm">

                    <!-- Mot de passe -->
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">
                            <i class="bi bi-lock-fill primary"></i> Nouveau mot de passe <span class="text-danger">*</span>
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input 
                                type="password" class="form-control" id="newPassword" placeholder="••••••••••" required minlength="10">
                            <span class="password-toggle" type="button" id="togglePassword">
                                <i class="bi bi-eye-fill"></i>
                            </span>
                        </div>
                        
                        <!-- Barre de force -->
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>

                        <!-- Exigences -->
                        <div class="password-requirements mt-2">
                            <div class="requirement" id="req-length">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Minimum 10 caractères</span>
                            </div>
                            <div class="requirement" id="req-uppercase">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 majuscule</span>
                            </div>
                            <div class="requirement" id="req-lowercase">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 minuscule</span>
                            </div>
                            <div class="requirement" id="req-number">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 chiffre</span>
                            </div>
                            <div class="requirement" id="req-special">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Au moins 1 caractère spécial (!@#$%^&*)</span>
                            </div>
                        </div>
                    </div>

                    <!-- Confirmation mot de passe -->
                    <div class="mb-3">
                        <label for="passwordConfirm" class="form-label">
                            <i class="bi bi-shield-lock-fill"></i> Confirmer le nouveau mot de passe <span class="text-danger">*</span>
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input 
                                type="password" class="form-control" id="passwordConfirm" placeholder="••••••••••" required>
                            <span class="password-toggle" type="button" id="togglePasswordConfirm">
                                <i class="bi bi-eye-fill"></i>
                            </span>
                        </div>
                        <small id="passwordMatchMessage" class="text-danger" style="display: none;">
                            Les mots de passe ne correspondent pas
                        </small>
                    </div>

                    <!-- Bouton inscription -->
                    <button type="submit" class="btn btn-register" id="resetPasswordBtn">
                        <i class="bi bi-unlock-fill"></i> Réinitialiser mon mot de passe
                    </button>

                </form>
                <!-- Messages -->
                <div id="message" class="message hidden"></div>

            </div>
        </div>

    </div>
</div>
